<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" routerLink="/inicio" style="cursor: pointer;">
        <img src="recursos/img/logo.png" alt="Logo" width="45" class="me-2">
        <span class="fw-bold text-success fs-3">{{ title() }}</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          
          <ng-container *ngIf="authService.isLoggedIn$ | async">
          
          <!-- Si es admin muestra esto sino muestra la tienda normal -->
          <li class="nav-item" *ngIf="authService.getUserRole() === 'ADMIN'">
            <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-3 shadow-sm bg-success-subtle" 
              style="cursor: pointer;" 
              (click)="verDetalle('admin/catalogo-admin')" 
              routerLinkActive="active-link">
              <i class="bi bi-shield-lock-fill"></i> Panel Admin - Productos
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" style="cursor: pointer;" (click)="verDetalle('catalogo')" routerLinkActive="active-link">Catálogo</a>
          </li>

          </ng-container>

          <li class="nav-item">
            <a class="nav-link" style="cursor: pointer;" (click)="verDetalle('citas')" routerLinkActive="active-link">Citas</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" style="cursor: pointer;" (click)="verDetalle('blog')" routerLinkActive="active-link">Blog</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" style="cursor: pointer;" (click)="verDetalle('dietas')" routerLinkActive="active-link">Dietas</a>
          </li>

          <li class="nav-item ms-lg-3" *ngIf="!(authService.isLoggedIn$ | async)">
            <a class="nav-link btn btn-outline-success px-3 me-2" style="cursor: pointer;" (click)="verDetalle('login')">Login</a>
          </li>

          <ng-container *ngIf="authService.isLoggedIn$ | async">
            <li class="nav-item">
              <a class="nav-link position-relative" style="cursor: pointer;" (click)="verDetalle('carrito')" routerLinkActive="active-link">
                <i class="bi bi-cart"></i> Carrito
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
              </a>
            </li>

            <li class="nav-item ms-lg-2">
              <a class="nav-link" style="cursor: pointer;" (click)="verDetalle('perfil')" routerLinkActive="active-link">
                <i class="bi bi-person-circle fs-5"></i> Mi Perfil
              </a>
            </li>

            <li class="nav-item ms-lg-2">
              <button class="btn btn-outline-danger px-3 me-2" (click)="authService.logout()">Cerrar Sesión</button>
            </li>
          </ng-container>

        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <router-outlet></router-outlet>
</main>

<footer class="py-4 mt-5 border-top text-center text-muted">
  <p>© 2026 {{ title() }} - Naturalmente contigo</p>
</footer>
