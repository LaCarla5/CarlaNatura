<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" routerLink="/inicio" style="cursor: pointer;">
        <img src="recursos/img/corporativo/logo.png" alt="Logo" width="45" class="me-2">
        <span class="fw-bold text-success fs-3">{{ title() }}</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center py-3 py-lg-0 gap-2 gap-lg-0">
          
          <ng-container *ngIf="authService.isLoggedIn$ | async">
            
            <ng-container *ngIf="authService.getUserRole() === 'ADMIN'">
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle mb-2 mb-lg-0 d-inline-block d-lg-block" 
                   routerLink="/admin/catalogo-admin" routerLinkActive="active-link">
                  <i class="bi bi-shield-lock-fill"></i> Productos
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle mb-2 mb-lg-0 d-inline-block d-lg-block" 
                   routerLink="/admin/usuarios-admin" routerLinkActive="active-link">
                  <i class="bi bi-people-fill"></i> Usuarios
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle mb-2 mb-lg-0 d-inline-block d-lg-block" 
                   routerLink="/admin/citas-admin" routerLinkActive="active-link">
                  <i class="bi bi-calendar-check"></i> Citas
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle mb-2 mb-lg-0 d-inline-block d-lg-block" 
                   routerLink="/admin/blog-admin" routerLinkActive="active-link">
                  <i class="bi bi-calendar-check"></i> Blog
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle mb-2 mb-lg-0 d-inline-block d-lg-block" 
                   routerLink="/admin/compras-admin" routerLinkActive="active-link">
                  <i class="bi bi-calendar-check"></i> Pedidos
                </a>
              </li>
            </ng-container>

            <ng-container *ngIf="authService.getUserRole() === 'USER'">
              <li class="nav-item"><a class="nav-link" routerLink="/catalogo" routerLinkActive="active-link">Catálogo</a></li>
              <li class="nav-item"><a class="nav-link" routerLink="/citas" routerLinkActive="active-link">Citas</a></li>
              <li class="nav-item"><a class="nav-link" routerLink="/blog" routerLinkActive="active-link">Blog</a></li>
              <li class="nav-item"><a class="nav-link" routerLink="/dietas" routerLinkActive="active-link">Dietas</a></li>
              
              <li class="nav-item mb-2 mb-lg-0">
                <a class="nav-link position-relative d-inline-block d-lg-block" routerLink="/carrito">
                  <i class="bi bi-cart"> Carrito</i>
                  <span class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">
                    {{ miCarrito.cantidadTotal() }}
                  </span>
                </a>
              </li>
            </ng-container>

            <li class="nav-item ms-lg-2">
              <a class="nav-link" routerLink="/perfil" routerLinkActive="active-link">
                <i class="bi bi-person-circle fs-5"></i> Mi Perfil
              </a>
            </li>
            <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
              <button class="btn btn-danger fw-bold px-4 shadow-sm w-100 w-lg-auto" (click)="authService.logout()">
                Cerrar Sesión
              </button>
            </li>
          </ng-container>

          <ng-container *ngIf="!(authService.isLoggedIn$ | async)">
            <li class="nav-item"><a class="nav-link" routerLink="/blog">Blog</a></li>
            <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
              <a routerLink="/login" class="btn btn-success fw-bold px-4 shadow-sm d-block d-lg-inline-block text-center">
                Iniciar Sesión / Registrarse
              </a>
            </li>
          </ng-container>

        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <router-outlet></router-outlet>
</main>

<footer class="py-4 mt-5 border-top text-center text-muted">
  <p>© 2026 {{ title() }} - Naturalmente contigo</p>
</footer>
