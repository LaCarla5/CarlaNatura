<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" routerLink="/inicio" style="cursor: pointer;">
        <img src="recursos/img/corporativo/logo.png" alt="Logo" width="45" class="me-2">
        <span class="fw-bold text-success fs-3">{{ title() }}</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          
          <ng-container *ngIf="authService.isLoggedIn$ | async">
            
            <ng-container *ngIf="authService.getUserRole() === 'ADMIN'">
              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle" 
                   style="cursor: pointer;" (click)="verDetalle('admin/catalogo-admin')">
                  <i class="bi bi-shield-lock-fill"></i> Admin - Productos
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle" 
                   style="cursor: pointer;" (click)="verDetalle('admin/usuarios-admin')">
                  <i class="bi bi-shield-lock-fill"></i> Admin - Usuarios
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle" 
                   style="cursor: pointer;" (click)="verDetalle('admin/citas-admin')">
                  <i class="bi bi-shield-lock-fill"></i> Admin - Citas
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link text-success fw-bold border border-success rounded-pill px-3 me-lg-2 shadow-sm bg-success-subtle" 
                   style="cursor: pointer;" (click)="verDetalle('admin/blog-admin')">
                  <i class="bi bi-shield-lock-fill"></i> Admin - Blog
                </a>
              </li>

              </ng-container>

            <ng-container *ngIf="authService.getUserRole() === 'USER'">
              <li class="nav-item"><a class="nav-link" (click)="verDetalle('catalogo')">Catálogo</a></li>
              <li class="nav-item"><a class="nav-link" (click)="verDetalle('citas')">Citas</a></li>
              <li class="nav-item"><a class="nav-link" (click)="verDetalle('blog')">Blog</a></li>
              <li class="nav-item"><a class="nav-link" (click)="verDetalle('dietas')">Dietas</a></li>
              
              <li class="nav-item">
                <a class="nav-link position-relative" (click)="verDetalle('carrito')">
                  <i class="bi bi-cart"></i> Carrito
                  <span class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">0</span>
                </a>
              </li>
            </ng-container>

            <li class="nav-item ms-lg-2">
              <a class="nav-link" (click)="verDetalle('perfil')">
                <i class="bi bi-person-circle fs-5"></i> Mi Perfil
              </a>
            </li>
            <li class="nav-item ms-lg-2">
              <button class="btn btn-outline-danger px-3" (click)="authService.logout()">Cerrar Sesión</button>
            </li>
          </ng-container>

          <ng-container *ngIf="!(authService.isLoggedIn$ | async)">
            <li class="nav-item"><a class="nav-link" (click)="verDetalle('blog')">Blog Público</a></li>
            <li class="nav-item ms-lg-3">
              <a class="btn btn-outline-success px-4 shadow-sm" (click)="verDetalle('login')">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión / Registro
              </a>
            </li>
          </ng-container>

        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <router-outlet></router-outlet>
</main>

<footer class="py-4 mt-5 border-top text-center text-muted">
  <p>© 2026 {{ title() }} - Naturalmente contigo</p>
</footer>
