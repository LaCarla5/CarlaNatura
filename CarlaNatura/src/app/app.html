<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" routerLink="/" style="cursor: pointer;">
        <img src="recursos/img/logo.png" alt="Logo" width="45" class="me-2">
        <span class="fw-bold text-success fs-3">{{ title() }}</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" routerLink="/Catalogo" routerLinkActive="active-link" (click)="verDetalle('catalogo')">Catálogo</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/Citas" (click)="verDetalle('catalogo')" routerLinkActive="active-link">Citas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/Blog" (click)="verDetalle('blog')" routerLinkActive="active-link">Blog</a>
          </li>

          <li class="nav-item ms-lg-3" *ngIf="!authService.isLoggedIn()" (click)="verDetalle('catalogo')">
            <a class="nav-link btn btn-outline-success px-3 me-2" routerLink="/Login"
              routerLinkActive="active">Login</a>
          </li>

          <ng-container *ngIf="authService.isLoggedIn()">
            <li class="nav-item">
              <a class="nav-link position-relative" routerLink="/Carrito" routerLinkActive="active-link">
                <i class="bi bi-cart"></i> Carrito
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
              </a>
            </li>
            <li class="nav-item ms-lg-2">
              <a class="nav-link" routerLink="/Perfil" routerLinkActive="active-link">
                <i class="bi bi-person-circle fs-5"></i> Mi Perfil
              </a>
            </li>
            <li class="nav-item ms-lg-2">
              <button class="btn btn-sm btn-link text-muted" (click)="authService.logout()">Salir</button>
            </li>
          </ng-container>
        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <router-outlet></router-outlet>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="py-4 mt-5 border-top text-center text-muted">
  <p>© 2026 {{ title() }} - Naturalmente contigo</p>
</footer>
