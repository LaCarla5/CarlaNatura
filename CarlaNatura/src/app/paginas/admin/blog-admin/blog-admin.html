<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success fw-bold">Panel de Blog ✍️</h2>
        <button class="btn btn-success rounded-pill px-4 shadow" (click)="mostrarFormulario = !mostrarFormulario">
            {{ mostrarFormulario ? 'Cerrar' : '+ Nuevo Post' }}
        </button>
    </div>

    @if (mostrarFormulario) {
    <div class="card border-0 shadow-sm rounded-4 p-4 mb-5 bg-light">
        <form (ngSubmit)="agregarPost()">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Título <span class="text-danger">*</span></label>
                    <input type="text" [(ngModel)]="nuevoPost.titulo" name="titulo" class="form-control"
                        [class.is-invalid]="!nuevoPost.titulo && formularioEnviado">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Categoría del Post <span class="text-danger">*</span></label>
                    <select [(ngModel)]="nuevoPost.categoria" name="categoria" class="form-select" required>
                        <option value="" disabled selected>Selecciona una temática...</option>
                        <option value="Salud">Salud y Bienestar</option>
                        <option value="Nutrición">Nutrición Natural</option>
                        <option value="Cosmética">Cosmética Bio</option>
                        <option value="Recetas">Recetas Saludables</option>
                        <option value="Consejos">Consejos del Taller</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Contenido del Post (opcional)</label>
                    <textarea [(ngModel)]="nuevoPost.contenido" name="contenido" class="form-control" rows="5"
                        placeholder="Escribe aquí tu post..." required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Imagen del Post (Archivo)</label>
                    <input type="file" (change)="onFileSelected($event)" class="form-control" accept="image/*">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Enlace Externo (Opcional)</label>
                    <input type="text" [(ngModel)]="nuevoPost.urlExterna" name="urlExterna" class="form-control"
                        placeholder="https://...">
                </div>
                <div class="col-12 text-end mt-4">
                    <button type="submit" class="btn btn-success px-5 rounded-pill shadow-sm">Publicar en el
                        Blog</button>
                </div>
            </div>
        </form>
    </div>
    }

    <div class="table-responsive shadow rounded-4 overflow-hidden">
        <table class="table table-hover align-middle bg-white mb-0">
            <thead class="table-dark">
                <tr>
                    <th style="width: 35%;">Post</th>
                    <th style="width: 15%;" class="d-none d-md-table-cell">Categoría</th>
                    <th style="width: 35%;" class="d-none d-lg-table-cell">Contenido / Enlace</th>
                    <th style="width: 15%;" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (p of post; track p.id) {
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img [src]="p.imagen_url" class="rounded me-3 shadow-sm flex-shrink-0"
                                style="width: 45px; height: 45px; object-fit: cover;">
                            <div class="text-truncate fw-bold" style="max-width: 250px;">{{ p.titulo }}</div>
                        </div>
                    </td>

                    <td class="d-none d-md-table-cell">
                        <span class="badge bg-success-subtle text-success border border-success-subtle text-nowrap">
                            {{ p.categoria }}
                        </span>
                    </td>

                    <td class="d-none d-lg-table-cell">
                        @if (p.urlExterna) {
                        <div class="text-truncate text-primary small">
                            <i class="bi bi-link-45deg"></i> {{ p.urlExterna }}
                        </div>
                        } @else {
                        <div class="text-truncate text-muted small" style="max-width: 300px;">
                            {{ p.contenido }}
                        </div>
                        }
                    </td>

                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-sm btn-outline-success border-0" (click)="abrirEditor(p)">
                                <i class="bi bi-pencil-fill fs-5"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger border-0" (click)="eliminar(p.id)">
                                <i class="bi bi-trash-fill fs-5"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
