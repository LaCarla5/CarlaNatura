<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success fw-bold">Panel de Blog ✍️</h2>
        <button class="btn btn-success rounded-pill px-4 shadow" (click)="mostrarFormulario = !mostrarFormulario">
            {{ mostrarFormulario ? 'Cerrar' : '+ Nuevo Post' }}
        </button>
    </div>

    @if (mostrarFormulario) {
    <div class="card border-0 shadow-sm rounded-4 p-4 mb-5 bg-light">
        <form (ngSubmit)="agregarPost()"> <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Título</label>
                    <input type="text" [(ngModel)]="nuevoPost.titulo" name="titulo" class="form-control"
                        placeholder="Título del Post" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Categoría</label>
                    <input type="text" [(ngModel)]="nuevoPost.categoria" name="categoria" class="form-control"
                        placeholder="Ej: Salud, Nutrición..." required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Contenido del Post</label>
                    <textarea [(ngModel)]="nuevoPost.contenido" name="contenido" class="form-control" rows="5" 
                            placeholder="Escribe aquí tu post..." required>
                    </textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">URL Imagen</label>
                    <input type="text" [(ngModel)]="nuevoPost.imagen" name="imagen" class="form-control"
                        placeholder="assets/recursos/img/blog/foto.jpg">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Enlace Externo (Opcional)</label>
                    <input type="text" [(ngModel)]="nuevoPost.urlExterna" name="urlExterna" class="form-control"
                        placeholder="https://...">
                </div>
                <div class="col-12 text-end mt-4">
                    <button type="submit" class="btn btn-success px-5 rounded-pill shadow-sm">
                        Publicar en el Blog
                    </button>
                </div>
            </div>
        </form>
    </div>
    }

    <div class="table-responsive shadow rounded-4">
        <table class="table table-hover align-middle bg-white mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Post</th>
                    <th>Categoría</th>
                    <th>Resumen</th>
                    <th>Enlace</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (p of post; track p.id) {
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img [src]="p.imagen" class="rounded me-3 shadow-sm"
                                style="width: 50px; height: 50px; object-fit: cover;">
                            <span class="fw-bold">{{ p.titulo }}</span>
                        </div>
                    </td>
                    <td><span class="badge bg-success-subtle text-success border border-success-subtle">{{ p.categoria }}</span></td>
                    <td>
                        <div class="text-truncate" style="max-width: 200px;">{{ p.contenido }}</div>
                    </td>
                    <td>
                        <small class="text-muted">{{ p.urlExterna || 'Sin link' }}</small>
                    </td>
                    <td class="text-center">
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-danger btn-editado" (click)="eliminar(p.id)" title="Eliminar">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
