<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-success fw-bold">Gestión de Inventario 🌿</h2>
    <button class="btn btn-success rounded-pill px-4" (click)="toggleFormulario()">
      {{ mostrarFormulario ? 'Cerrar' : '+ Nuevo Producto' }}
    </button>
  </div>

  @if (mostrarFormulario) {
  <div class="card border-0 shadow-sm rounded-4 p-4 mb-5 bg-light">
    <h4 class="text-secondary mb-3">{{ editando ? 'Editar Producto' : 'Nuevo Producto' }}</h4>
    <form (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" [(ngModel)]="nuevoProducto.nombre" name="nombre" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Precio €</label>
          <input type="number" [(ngModel)]="nuevoProducto.precio" name="precio" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Stock</label>
          <input type="number" [(ngModel)]="nuevoProducto.stock" name="stock" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Imagen</label>
          <input type="file" (change)="onFileSelected($event)" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Descripción</label>
          <input type="text" [(ngModel)]="nuevoProducto.descripcion" name="descripcion" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Categoría</label>
          <select [(ngModel)]="nuevoProducto.categoria_id" name="categoria_id" class="form-select">
            <option [value]="null" disabled selected>Selecciona una categoría...</option>
            <option [value]="1">Cuidado Facial</option>
            <option [value]="2">Suplementos Naturales</option>
            <option [value]="3">Aromaterapia</option>
          </select>
        </div>
        <div class="col-12 text-end">
          <button type="button" class="btn btn-outline-secondary me-2 rounded-pill"
            (click)="cancelar()">Cancelar</button>
          <button type="submit" class="btn btn-success px-5 rounded-pill">{{ editando ? 'Actualizar' : 'Guardar'
            }}</button>
        </div>
      </div>
    </form>
  </div>
  }

  <div class="table-responsive shadow rounded-4">
    <table class="table table-hover align-middle bg-white mb-0">
      <thead class="table-dark">
        <tr>
          <th>Producto</th>
          <th>Precio</th>
          <th>Stock</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (p of productos; track p.id) {
        <tr>
          <td>
            <div class="d-flex align-items-center">
              <!-- Concatenamos la URL del servidor + carpeta + nombre del archivo -->
              <img [src]="'http://localhost:3000/uploads/productos/' + p.imagen" class="rounded me-3"
                style="width: 50px; height: 50px; object-fit: cover;" onerror="this.src='assets/img/placeholder.jpg'">
              <!-- Imagen por defecto si falla -->
              <span class="fw-bold">{{ p.nombre }}</span>
            </div>
          </td>
          <td>{{ p.precio | currency:'EUR' }}</td>
          <td>
            <span class="badge rounded-pill" [ngClass]="p.stock <= 5 ? 'bg-danger' : 'bg-success'">
              {{ p.stock }} uds
            </span>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-success me-2" (click)="prepararEdicion(p)">
              <i class="bi bi-pencil-fill"></i> Editar
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="eliminar(p.id)">
              <i class="bi bi-trash-fill"></i> Eliminar
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
