<div class="container-fluid mt-4">
  <div class="row">
    
    <div class="col-md-4">
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-warning text-dark fw-bold">
          <i class="bi bi-clock-history"></i> Solicitudes a la espera
        </div>
        <div class="list-group list-group-flush" style="max-height: 80vh; overflow-y: auto;">
          @if (citasPendientes.length === 0) {
            <div class="p-4 text-center text-muted">No hay citas pendientes 🌿</div>
          }
          @for (cita of citasPendientes; track cita.id) {
            <div class="list-group-item p-3">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <h6 class="mb-0 fw-bold">{{ cita.nombre }}</h6>
                  <small class="text-success d-block">{{ cita.servicio }}</small>
                  <small class="text-muted"><i class="bi bi-calendar-event"></i> {{ cita.fecha }} | {{ cita.hora }}</small>
                </div>
                <div class="btn-group">
                  <button (click)="gestionarCita(cita.id, 'confirmada', cita.email)" class="btn btn-sm btn-success">
                    <i class="bi bi-check-lg"></i>
                  </button>
                  <button (click)="gestionarCita(cita.id, 'cancelada', cita.email)" class="btn btn-sm btn-danger">
                    <i class="bi bi-x-lg"></i>
                  </button>
                </div>
              </div>
              <p class="mt-2 small text-secondary bg-light p-2 rounded">"{{ cita.descripcion }}"</p>
            </div>
          }
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="text-success mb-3">Agenda General CarlaNatura</h4>
        <mwl-calendar-month-view
          [viewDate]="viewDate"
          [events]="eventosCalendario">
        </mwl-calendar-month-view>
      </div>
    </div>

  </div>
</div>
