<main>
  <section id="catalogo" class="catalog-section container-fluid px-4">
    <div class="container">
      <h2 class="text-center section-title">Nuestro Catálogo Natura</h2>

      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        @for (item of productos; track item.id) {
          <div class="col">
            <div class="card h-100 shadow-sm product-card">
              <div class="img-container">
                <img [src]="item.imagen" [alt]="item.nombre" loading="lazy">
              </div>
              
              <div class="card-body d-flex flex-column">
                <h5 class="product-title">{{ item.nombre }}</h5>
                <p class="text-muted small flex-grow-1">{{ item.descripcion }}</p>
                <p class="product-price">${{ item.precio }}</p>
                
                <button 
                  class="btn-add shadow-sm" 
                  (click)="agregarAlCarrito(item)">
                  <i class="bi bi-cart-plus-fill me-2"></i>
                  Añadir al carrito
                </button>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </section>
</main>
