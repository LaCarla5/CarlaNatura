<main>
  <section id="catalogo" class="catalog-section container-fluid px-4">
    <div class="container">
      <h2 class="text-center section-title">Nuestro Catálogo Natura</h2>

    <div class="row">
      @for (item of productos; track item.id) {
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm border-0">
            <img [src]="item.imagen" class="card-img-top" alt='{{ item.nombre }}'>
            <div class="card-body text-center">
              <h5 class="fw-bold">{{ item.nombre }}</h5>
              <p class="text-success fs-4">{{ item.precio }}€</p>
              
              <button class="btn btn-outline-success rounded-pill px-4" 
                      (click)="agregarAlCarrito(item)">
                Añadir al Carrito
              </button>
            </div>
          </div>
        </div>
      }
    </div>
    </div>
  </section>
</main>
