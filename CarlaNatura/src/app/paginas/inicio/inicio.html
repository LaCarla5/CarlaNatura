<section class="hero-store">
  <img src="recursos/img/corporativo/fondoTienda.png" alt="FondoTienda" class="hero-store__image">
  <div class="hero-store__overlay">
    <h1 class="hero-store__title">Vive la experiencia CarlaNatura</h1>
    <button class="btn btn-outline-light rounded-pill px-4" (click)="verDetalle('catalogo')">
      Explorar tienda
    </button>
  </div>
</section>

<section class="bg-natural py-5">
  <div class="container">
    <div class="row row-overlap justify-content-center">

      <div class="col-md-4 mb-4">
        <div class="card hover-card text-center" (click)="verDetalle('catalogo')">
          <div class="icon-box"><i class="bi bi-leaf"></i></div>
          <h3>Catálogo Natura</h3>
          <p>Nuestra mejor selección de aceites y cosmética orgánica.</p>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card hover-card text-center" (click)="verDetalle('citas')">
          <div class="icon-box"><i class="bi bi-calendar-heart"></i></div>
          <h3>Reserva Cita</h3>
          <p>Atención personalizada para tu bienestar integral.</p>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card hover-card text-center" (click)="verDetalle('blog')">
          <div class="icon-box"><i class="bi bi-journal-text"></i></div>
          <h3>Nuestro Blog</h3>
          <p>Aprende sobre rituales naturales y vida saludable.</p>
        </div>
      </div>
    </div>
  </div>
</section>
