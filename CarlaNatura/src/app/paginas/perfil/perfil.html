<div class="perfil-container container d-flex justify-content-center align-items-center py-5">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6">
      
      <div class="profile-card card-relief p-4 p-md-5 pt-md-6 text-center position-relative mt-5">
        
      <div class="avatar-circle rounded-circle shadow-lg bg-white border border-4">
        
        <img [src]="userPhoto" 
            class="img-fluid rounded-circle avatar-img" 
            alt="Foto de perfil"
            (error)="userPhoto = fotoPorDefecto"> 
            <label *ngIf="editMode" for="fotoInput" class="edit-photo-btn">
          <i class="bi bi-camera-fill"></i>
          <input type="file" id="fotoInput" (change)="onFileSelected($event)" class="d-none">
        </label>
      </div>

        <div class="profile-content mt-5 pt-3">
          <h1 class="text-verde fw-bold h2 mb-2">Mi Perfil</h1>
          <p class="text-muted mb-4">¡Qué alegría verte de nuevo, <strong>{{ userName }}</strong>!</p>

          <div class="account-info bg-light rounded-4 p-4 mb-4 text-start shadow-sm border border-light">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <strong class="text-muted small text-uppercase letter-spacing-1">Tipo de Cuenta</strong>
              <span class="badge rounded-pill px-3 py-2" 
                    [ngClass]="userRole === 'ADMIN' ? 'bg-verde-intenso' : 'bg-verde-suave'">
                {{ userRole }}
              </span>
            </div>
            <hr class="opacity-10 my-3">
            <p class="small text-muted mb-0 d-flex align-items-center">
              <i class="bi bi-shield-check text-success fs-5 me-2"></i>
              Acceso exclusivo a tu historial de citas y promociones naturales.
            </p>
          </div>

          <div class="d-grid gap-3 d-sm-flex justify-content-sm-center profile-actions mt-4">
            <button class="btn btn-primary btn-lg rounded-5 px-4 shadow-sm" routerLink="/catalogo">
              <i class="bi bi-shop me-2"></i>Catálogo
            </button>
            <button class="btn btn-outline-danger btn-lg rounded-5 px-4" (click)="onLogout()">
              <i class="bi bi-power me-2"></i>Salir
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
