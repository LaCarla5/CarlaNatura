<div class="perfil-container container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <div class="profile-card border shadow p-5 text-center bg-white rounded-4">
        
        <div class="profile-avatar-container mb-4 position-relative d-inline-block">
          
          <div class="avatar-circle rounded-circle shadow-sm d-flex align-items-center justify-content-center border"
               style="width: 150px; height: 150px; overflow: hidden; background-color: #f8f9fa;">
            
            <img *ngIf="fotoPreview" [src]="fotoPreview" class="img-fluid rounded-circle" style="object-fit: cover; width: 100%; height: 100%;" alt="Previsualización">
            <img *ngIf="!fotoPreview && userPhoto" [src]="userPhoto" class="img-fluid rounded-circle" style="object-fit: cover; width: 100%; height: 100%;" alt="Foto de {{ userName }}">
            
            <i *ngIf="!fotoPreview && !userPhoto" class="bi bi-person-circle text-muted" style="font-size: 6rem;"></i>
          </div>

          <label *ngIf="editMode" for="fotoInput" class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 edit-photo-btn shadow" title="Cambiar foto">
            <i class="bi bi-camera-fill"></i>
            <input type="file" id="fotoInput" (change)="onFileSelected($event)" accept="image/*" class="d-none">
          </label>
        </div>

        <h1 class="text-verde fw-bold h2 mb-2">Mi Perfil</h1>
        
        <ng-container *ngIf="!editMode">
          <p class="text-muted mb-4 fs-5">Bienvenido, <strong>{{ userName }}</strong></p>
          <div class="account-info bg-light rounded-3 p-3 mb-4 text-start small border border-light">
            <div class="d-flex justify-content-between mb-1">
              <strong>Rol de Cuenta:</strong>
              <span class="badge bg-verde-suave text-success rounded-pill px-3">{{ userRole }}</span>
            </div>
            <p class="text-muted mb-0">Sección exclusiva para usuarios registrados.</p>
          </div>
          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <button class="btn btn-outline-success rounded-5 px-4" (click)="activarEdicion()">
              <i class="bi bi-pencil-square me-2"></i>Editar Datos
            </button>
            <button class="btn btn-outline-danger rounded-5 px-4" (click)="authService.logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </button>
          </div>
        </ng-container>

        <ng-container *ngIf="editMode">
          <form (ngSubmit)="guardarCambios()" class="text-start mt-4">
            <div class="mb-4">
              <label for="nombre" class="form-label text-muted small text-uppercase letter-spacing-1">Nombre Completo</label>
              <input type="text" id="nombre" name="nombre" [(ngModel)]="nombreEditado" class="form-control form-control-lg border-success" placeholder="Tu nombre">
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center profile-actions mt-5 pt-3">
              <button type="button" class="btn btn-outline-secondary rounded-5 px-4" (click)="cancelarEdicion()">
                <i class="bi bi-x-circle me-2"></i>Cancelar
              </button>
              <button type="submit" class="btn btn-success rounded-5 px-5 shadow-sm" [disabled]="!nombreEditado.trim()">
                <i class="bi bi-check-circle me-2"></i>Guardar Cambios
              </button>
            </div>
          </form>
        </ng-container>

      </div>
    </div>
  </div>
</div>
